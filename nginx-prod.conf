worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 443 ssl; # managed by Certbot
        server_name lightcrypto.website www.lightcrypto.website;
        include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot

        root /var/www/crypto/build;
        index index.html;

        gzip on;
        gzip_comp_level 5;
        gzip_types application/javascript text/css image/svg+xml;

        location / {
            try_files $uri /index.html;
        }

        location /static/ {
            try_files $uri $uri/ =404;
        }


        ssl_certificate /etc/letsencrypt/live/lightcrypto.website/fullchain.pem; # managed by Certbot
        ssl_certificate_key /etc/letsencrypt/live/lightcrypto.website/privkey.pem; # managed by Certbot
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
    }


    server {
        listen 80;
        server_name lightcrypto.website www.lightcrypto.website;

        if ($host = www.lightcrypto.website) {
            return 301 https://$host$request_uri;
        } # managed by Certbot


        if ($host = lightcrypto.website) {
            return 301 https://$host$request_uri;
        } # managed by Certbot


        return 404; # managed by Certbot

    }
}