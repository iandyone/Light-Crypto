name: "Build and deploy"

run-name: "Make a build and deploy to VPS"

on:
  push:
    tags:
      - "v*"

env:
  RELEASE_DIR: /var/www/crypto/releases/${{ github.ref_name }}
  CURRENT_LINK: /var/www/crypto/current

jobs:
  Build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Cloning repository"
        uses: actions/checkout@v6

      - name: "Setup node"
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      - name: "Build"
        env:
          REACT_APP_CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        run: npm run build

      - name: "Create build artifact"
        if: ${{ success() }}
        uses: actions/upload-artifact@v7
        with:
          name: "light-crypto-${{ github.ref_name }}"
          path: "build"
          retention-days: 1

  Deploy:
    runs-on: "ubuntu-latest"
    needs: ["Build"]
    steps:
      - name: "Check nginx"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: nginx -t

      - name: "Download build artifact"
        if: ${{ success() }}
        uses: actions/download-artifact@v8
        with:
          name: "light-crypto-${{ github.ref_name }}"
          # копируем с папкой build
          path: ./build

      - name: "Copy files via SSH to releases directory"
        if: ${{ success() }}
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "./build/**"
          # для копирования содержимого папки build (без самой папки)
          strip_components: 1
          target: ${{ env.RELEASE_DIR }}

      - name: "Verify uploaded files"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            test -d ${{ env.RELEASE_DIR }}
            test -d ${{ env.RELEASE_DIR }}/static
            test -f ${{ env.RELEASE_DIR }}/index.html

      - name: "Switch production symlink to the release"
        if: ${{ success() }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            test -f ${{ env.RELEASE_DIR }}/index.html  
            ln -sfn ${{ env.RELEASE_DIR }} ${{ env.CURRENT_LINK }}
            test -L /var/www/crypto/current
            test -f /var/www/crypto/current/index.html
            readlink /var/www/crypto/current

      - name: "Reload nginx"
        if: ${{ success() }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: nginx -s reload

      - name: "Health check"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_ADDRESS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -f lightcrypto.website





