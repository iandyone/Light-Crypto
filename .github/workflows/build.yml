name: "Build"

on:
  push:
    branches-ignore:
      - "master"
  pull_request:
    branches:
      - "master"

jobs:
  Build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Cloning repository"
        uses: actions/checkout@v6

      - name: "Setup node"
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "npm"

      - name: "Install dependencies"
        run: npm ci

      - name: "Checking for critical dependency vulnerabilities"
        run: npm audit --audit-level=critical

      - name: "Build"
        if: ${{ success() }}
        env:
          REACT_APP_CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        run: npm run build
